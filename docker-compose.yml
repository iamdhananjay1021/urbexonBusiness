version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: urbexon-backend
    restart: unless-stopped
    ports:
      - "9000:9000"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
    depends_on:
      - mongo
    networks:
      - urbexon-net

  mongo:
    image: mongo:7
    container_name: urbexon-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    networks:
      - urbexon-net

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:9000/api}
    container_name: urbexon-client
    restart: unless-stopped
    ports:
      - "5173:80"
    networks:
      - urbexon-net

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:9000/api}
    container_name: urbexon-admin
    restart: unless-stopped
    ports:
      - "5174:80"
    networks:
      - urbexon-net

  vendor:
    build:
      context: ./vendor-panel
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:9000/api}
    container_name: urbexon-vendor
    restart: unless-stopped
    ports:
      - "5175:80"
    networks:
      - urbexon-net

  delivery:
    build:
      context: ./delivery-panel
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:9000/api}
    container_name: urbexon-delivery
    restart: unless-stopped
    ports:
      - "5176:80"
    networks:
      - urbexon-net

volumes:
  mongo-data:

networks:
  urbexon-net:
    driver: bridge
