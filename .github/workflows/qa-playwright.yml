name: QA Playwright

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  playwright:
    name: Playwright E2E + API
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      TEST_ENV: development
      DEV_API_URL: http://localhost:9000
      DEV_CLIENT_URL: http://localhost:5173
      DEV_ADMIN_URL: http://localhost:5174
      DEV_VENDOR_URL: http://localhost:5175
      DEV_DELIVERY_URL: http://localhost:5176
      MONGO_URI: ${{ secrets.QA_MONGO_URI }}
      JWT_SECRET: ${{ secrets.QA_JWT_SECRET }}
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ── Backend ──
      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Start backend
        working-directory: backend
        run: |
          node server.js &
          echo "Waiting for API..."
          npx --yes wait-on http://localhost:9000/api/products?limit=1 --timeout 60000

      # ── Testing suite ──
      - name: Install testing deps
        working-directory: testing
        run: npm ci

      - name: Install Playwright browsers
        working-directory: testing
        run: npx playwright install --with-deps chromium

      # API + security + flow + perf suites (no frontend build needed)
      - name: Run API-level suites
        working-directory: testing
        run: npx playwright test --project=api
        env:
          SEED: 1

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: testing/reports/html
          retention-days: 14

      - name: Upload JSON results + artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            testing/reports/results.json
            testing/reports/artifacts
          retention-days: 14
