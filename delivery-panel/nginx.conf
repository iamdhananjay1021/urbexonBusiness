server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # SEO/crawl hygiene — internal, authenticated tooling only. Header-level
    # is the strongest layer (applies even to non-HTML responses and holds
    # even if a bot skips robots.txt/meta parsing); paired with
    # public/robots.txt (disallow-all) and the noindex meta tag in
    # index.html.
    add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet" always;

    location / {
        try_files $uri $uri/ /index.html;
    }
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet" always;
    }
}
